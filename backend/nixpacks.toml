# Railway nixpacks build configuration for TruthLens Backend

[phases.setup]
nixPkgs = ["python312", "gcc", "libffi", "zlib", "libjpeg", "libpng"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2 --log-level info"
